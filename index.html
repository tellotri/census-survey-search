const YEARS_ALL = ["All", "Pre-2015", "2015–2019", "2020–2022", "2023–2025"];

function yearInRange(year, range) {
  if (range === "All") return true;
  if (range === "Pre-2015") return /\b(200[0-9]|201[0-4])\b/.test(year);
  if (range === "2015–2019") return /\b(201[5-9])\b/.test(year);
  if (range === "2020–2022") return /\b(202[0-2])\b/.test(year);
  if (range === "2023–2025") return /\b(202[3-5])\b/.test(year);
  return true;
}

function highlight(text, terms) {
  if (!terms || terms.length === 0) return text;
  const regex = new RegExp(`(${terms.map(t => t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')).join('|')})`, 'gi');
  const parts = text.split(regex);
  return parts.map((p, i) =>
    regex.test(p) ? <mark key={i} style={{ background: '#fef08a', borderRadius: 2, padding: '0 1px' }}>{p}</mark> : p
  );
}

  "Incentives": "🏆",
  "Promotions & Dismissals": "📊",
  "Organization & Decentralization": "🏢",
  "Data & Decision Making": "📊",
  "Costs & Purchased Services": "💰",
  "Innovation": "🔬",
  "R&D Paid For by Company": "🔬", "R&D Paid For by Others": "🤝",
  "R&D Management & Strategy": "🧭", "Intellectual Property & Technology Transfer": "⚖️",
  "Tax Topics": "🧾", "Assets": "🏗️",
  "Workforce Characteristics": "👥",
  "Employment": "👔",
  "Financing": "💵",
  "Computer & Internet": "💻",
  "Industrial Robots": "🦾",
  "Employment & Payroll": "👔",
  "Fringe Benefits": "🏥",
  "Inventories": "📦",
  "Capital Expenditures": "🏗️",
  "Rental Payments": "🏢",
  "Selected Expenses": "💰",
  "Sales & Revenue": "📈",
  "Operational Status": "🔄",
  "Principal Activity": "🏭",
  "Donated Products": "🎁",
  "COVID-19 Impact": "🦠",
  "Ownership (single-unit)": "🏛️",
  "Establishment Count (single-unit)": "📍",
};

function App() {
  const [query, setQuery] = useState("");
  const [results, setResults] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [filterSurvey, setFilterSurvey] = useState("All");
  const [filterYear, setFilterYear] = useState("All");
  const [highlightTerms, setHighlightTerms] = useState([]);
  const [apiKey, setApiKey] = useState("");

  async function doSearch() {
    if (!query.trim()) return;
    if (!apiKey.trim()) { setError("Please enter your Anthropic API key above before searching."); return; }
    setLoading(true);
    setError(null);
    setResults(null);

    const filtered = DB.filter(q =>
      (filterSurvey === "All" || q.survey === filterSurvey) &&
      yearInRange(q.year, filterYear)
    );

    const prompt = `You are a research assistant helping a user find relevant US Census survey questions.

The user's search topic is: "${query}"

Below is a complete list of Census survey questions (with IDs). Your task:
1. Identify ALL questions that are semantically relevant to the user's topic — including synonyms, related concepts, and adjacent themes.
2. Be INCLUSIVE: evaluate every question independently. Do NOT skip a question just because another similar one was already matched.
3. Return a JSON array of objects, each with:
   - "id": the question ID
   - "relevance": a short 1-sentence explanation of why it matches (plain text, no markdown)
4. Return ONLY the JSON array. No preamble, no markdown fences.
5. If no questions match, return an empty array [].

Questions:
${filtered.map(q => `ID: ${q.id}\nSurvey: ${q.survey} (${q.year})\nSection: ${q.section}\nQuestion: ${q.question}`).join('\n\n')}`;

    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json", "x-api-key": apiKey, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
        body: JSON.stringify({
          model: "claude-haiku-4-5-20251001",
          max_tokens: 4000,
          messages: [{ role: "user", content: prompt }]
        })
      });
      const data = await res.json();
      const raw = data.content?.find(b => b.type === "text")?.text || "[]";
      const parsed = JSON.parse(raw.replace(/```json|```/g, "").trim());

      const matched = parsed
        .map(r => {
          const q = DB.find(x => x.id === r.id);
          return q ? { ...q, relevance: r.relevance } : null;
        })
        .filter(Boolean);

      const terms = query.trim().split(/\s+/).filter(t => t.length > 2);
      setHighlightTerms(terms);
      setResults(matched);
    } catch (e) {
      setError("Something went wrong. Please try again.");
    }
    setLoading(false);
  }

  const grouped = results
    ? results.reduce((acc, q) => {
        if (!acc[q.survey]) acc[q.survey] = [];
        acc[q.survey].push(q);
        return acc;
      }, {})
    : {};

  const totalQuestions = DB.length;
  const totalSurveys = Array.from(new Set(DB.map(q => q.survey))).length;

  return (
    <div style={{ fontFamily: "'Inter', system-ui, sans-serif", minHeight: "100vh", background: "#f1f5f9" }}>
      {/* Header */}
      <div style={{
        background: "linear-gradient(135deg, #1e3a5f 0%, #1e4976 60%, #163354 100%)",
        color: "white",
        padding: "28px 0 22px",
        boxShadow: "0 2px 12px rgba(0,0,0,0.18)"
      }}>
        <div style={{ maxWidth: 820, margin: "0 auto", padding: "0 24px" }}>
          <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", flexWrap: "wrap", gap: 12 }}>
            <div>
              <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 6 }}>
                <span style={{ fontSize: 24 }}>🔍</span>
                <h1 style={{ margin: 0, fontSize: 22, fontWeight: 800, letterSpacing: "-0.4px" }}>
                  Census Questionnaire Search
                </h1>
              </div>
              <p style={{ margin: 0, fontSize: 13.5, color: "#93c5fd", lineHeight: 1.55 }}>
                Semantic search across US Census Bureau surveys — find questions by topic, concept, or keyword.
              </p>
            </div>
            <div style={{ display: "flex", gap: 10, alignSelf: "flex-end" }}>
              <div style={{ background: "rgba(255,255,255,0.1)", borderRadius: 8, padding: "7px 14px", textAlign: "center" }}>
                <div style={{ fontSize: 18, fontWeight: 800, lineHeight: 1 }}>{totalQuestions}</div>
                <div style={{ fontSize: 10.5, color: "#93c5fd", marginTop: 2 }}>Questions</div>
              </div>
              <div style={{ background: "rgba(255,255,255,0.1)", borderRadius: 8, padding: "7px 14px", textAlign: "center" }}>
                <div style={{ fontSize: 18, fontWeight: 800, lineHeight: 1 }}>{totalSurveys}</div>
                <div style={{ fontSize: 10.5, color: "#93c5fd", marginTop: 2 }}>Surveys</div>
              </div>
            </div>
          </div>
        </div>
      </div>

      {/* Search bar */}
      <div style={{ background: "white", borderBottom: "1px solid #e2e8f0", padding: "14px 0", boxShadow: "0 1px 4px rgba(0,0,0,0.05)" }}>
        <div style={{ maxWidth: 580, margin: "0 auto", padding: "0 24px" }}>

          {/* API Key input */}
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10, background: "#f8fafc", border: "1px solid #e2e8f0", borderRadius: 8, padding: "8px 12px" }}>
            <span style={{ fontSize: 13, color: "#64748b", whiteSpace: "nowrap", fontWeight: 500 }}>🔑 API Key:</span>
            <input
              type="password"
              value={apiKey}
              onChange={e => setApiKey(e.target.value)}
              placeholder="Enter your Anthropic API key (sk-ant-...)"
              style={{
                flex: 1, border: "none", background: "transparent", fontSize: 13,
                color: "#1e293b", outline: "none", fontFamily: "monospace"
              }}
            />
            {apiKey && <span style={{ fontSize: 11, color: "#16a34a", fontWeight: 600, whiteSpace: "nowrap" }}>✓ Set</span>}
          </div>

          {/* Search input */}
          <div style={{ display: "flex", gap: 8 }}>
            <div style={{ flex: 1, position: "relative" }}>
              <span style={{ position: "absolute", left: 12, top: "50%", transform: "translateY(-50%)", fontSize: 15, color: "#94a3b8" }}>🔍</span>
              <input
                value={query}
                onChange={e => setQuery(e.target.value)}
                onKeyDown={e => e.key === "Enter" && doSearch()}
                placeholder='Search by topic — e.g. "AI adoption", "remote work", "production bonuses"'
                style={{
                  width: "100%", padding: "10px 14px 10px 36px", fontSize: 14.5,
                  border: "1.5px solid #cbd5e1", borderRadius: 8, outline: "none",
                  color: "#1e293b", boxSizing: "border-box",
                  transition: "border-color 0.15s",
                }}
                onFocus={e => e.target.style.borderColor = "#3b82f6"}
                onBlur={e => e.target.style.borderColor = "#cbd5e1"}
              />
            </div>
            <button
              onClick={doSearch}
              disabled={loading || !query.trim()}
              style={{
                padding: "10px 24px",
                background: loading ? "#94a3b8" : "linear-gradient(135deg, #1e3a5f, #2563eb)",
                color: "white", border: "none", borderRadius: 8, fontSize: 14,
                fontWeight: 700, cursor: loading ? "not-allowed" : "pointer",
                whiteSpace: "nowrap", boxShadow: loading ? "none" : "0 2px 6px rgba(37,99,235,0.3)",
                transition: "all 0.15s",
              }}
            >
              {loading ? "Searching…" : "Search"}
            </button>
          </div>

          {/* Filters */}
          <div style={{ display: "flex", gap: 12, marginTop: 10, flexWrap: "wrap", alignItems: "center" }}>
            <span style={{ fontSize: 12, color: "#94a3b8", fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.05em" }}>Filter:</span>
            <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
              <span style={{ fontSize: 12, color: "#64748b", fontWeight: 500 }}>Survey</span>
              <select
                value={filterSurvey}
                onChange={e => setFilterSurvey(e.target.value)}
                style={{ fontSize: 12.5, padding: "5px 9px", borderRadius: 6, border: "1px solid #cbd5e1", color: "#334155", background: "#f8fafc" }}
              >
                {SURVEYS.map(s => <option key={s}>{s}</option>)}
              </select>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
              <span style={{ fontSize: 12, color: "#64748b", fontWeight: 500 }}>Year range</span>
              <select
                value={filterYear}
                onChange={e => setFilterYear(e.target.value)}
                style={{ fontSize: 12.5, padding: "5px 9px", borderRadius: 6, border: "1px solid #cbd5e1", color: "#334155", background: "#f8fafc" }}
              >
                {YEARS_ALL.map(y => <option key={y}>{y}</option>)}
              </select>
            </div>
          </div>
        </div>
      </div>

      {/* Results */}
      <div style={{ maxWidth: 820, margin: "0 auto", padding: "20px 24px" }}>
        {error && (
          <div style={{ background: "#fee2e2", border: "1px solid #fca5a5", borderRadius: 10, padding: 14, color: "#991b1b", fontSize: 14 }}>
            {error}
          </div>
        )}

        {results && results.length === 0 && (
          <div style={{ textAlign: "center", padding: "48px 0", color: "#64748b" }}>
            <div style={{ fontSize: 40, marginBottom: 10 }}>🔎</div>
            <div style={{ fontWeight: 700, fontSize: 16, marginBottom: 4, color: "#334155" }}>No matching questions found</div>
            <div style={{ fontSize: 14 }}>Try a different topic or broader search term.</div>
          </div>
        )}

        {results && results.length > 0 && (
          <>
            <div style={{ fontSize: 13, color: "#64748b", marginBottom: 16, display: "flex", alignItems: "center", gap: 8 }}>
              <span style={{ background: "#1e3a5f", color: "white", borderRadius: 20, padding: "2px 10px", fontSize: 12, fontWeight: 700 }}>
                {results.length} match{results.length !== 1 ? "es" : ""}
              </span>
              <span>across <strong>{Object.keys(grouped).length}</strong> survey{Object.keys(grouped).length !== 1 ? "s" : ""}</span>
            </div>
            {Object.entries(grouped).map(([survey, qs]) => {
              const colors = SURVEY_COLORS[survey] || { bg: "#f8fafc", text: "#475569", border: "#cbd5e1" };
              return (
                <div key={survey} style={{ marginBottom: 20, borderRadius: 10, overflow: "hidden", boxShadow: "0 1px 6px rgba(0,0,0,0.07)" }}>
                  <div style={{
                    background: "linear-gradient(135deg, #1e3a5f, #1e4976)",
                    color: "white", padding: "10px 16px",
                    fontSize: 13.5, fontWeight: 700,
                    display: "flex", alignItems: "center", justifyContent: "space-between"
                  }}>
                    <span>{survey}</span>
                    <span style={{ background: "rgba(255,255,255,0.18)", borderRadius: 12, padding: "1px 9px", fontSize: 12 }}>
                      {qs.length} question{qs.length !== 1 ? "s" : ""}
                    </span>
                  </div>
                  {qs.map((q, i) => (
                    <div key={q.id} style={{
                      background: "white",
                      borderLeft: `3px solid ${colors.border}`,
                      borderBottom: i < qs.length - 1 ? "1px solid #f1f5f9" : "none",
                      padding: "14px 16px",
                    }}>
                      <div style={{ display: "flex", gap: 6, marginBottom: 9, flexWrap: "wrap", alignItems: "center" }}>
                        <span style={{ fontSize: 12.5, color: "#64748b", fontWeight: 500, marginRight: 2 }}>
                          {SECTION_ICONS[q.section] || "📌"} {q.section}
                        </span>
                        {q.years && q.years.length > 1 ? (
                          <span style={{ display: "flex", gap: 3, flexWrap: "wrap" }}>
                            {q.years.map(y => (
                              <span key={y} style={{
                                background: "#dcfce7", color: "#166534",
                                border: "1px solid #bbf7d0",
                                borderRadius: 4, padding: "1px 7px", fontSize: 11, fontWeight: 700
                              }}>{y}</span>
                            ))}
                          </span>
                        ) : (
                          <span style={{
                            background: colors.bg, color: colors.text,
                            border: `1px solid ${colors.border}`,
                            borderRadius: 4, padding: "1px 7px", fontSize: 11, fontWeight: 600
                          }}>
                            {q.year}
                          </span>
                        )}
                        <span style={{
                          background: "#f1f5f9", color: "#64748b",
                          borderRadius: 4, padding: "1px 7px", fontSize: 10.5, fontWeight: 500,
                          fontFamily: "monospace"
                        }}>
                          {q.id}
                        </span>
                      </div>
                      <p style={{ margin: "0 0 10px", fontSize: 14, color: "#1e293b", lineHeight: 1.6 }}>
                        {highlight(q.question, highlightTerms)}
                      </p>
                      <div style={{
                        background: "#fffbeb", borderLeft: "3px solid #f59e0b",
                        padding: "6px 11px", borderRadius: "0 5px 5px 0",
                        fontSize: 12.5, color: "#78716c", display: "flex", gap: 6
                      }}>
                        <span style={{ fontWeight: 700, color: "#92400e", whiteSpace: "nowrap" }}>Why it matched:</span>
                        <span>{q.relevance}</span>
                      </div>
                    </div>
                  ))}
                </div>
              );
            })}
          </>
        )}

        {!results && !loading && (
          <div style={{ textAlign: "center", padding: "52px 0", color: "#94a3b8" }}>
            <div style={{ fontSize: 52, marginBottom: 14 }}>📋</div>
            <div style={{ fontWeight: 700, fontSize: 17, color: "#475569", marginBottom: 6 }}>
              Search Census Questionnaires
            </div>
            <div style={{ fontSize: 13.5, maxWidth: 440, margin: "0 auto", lineHeight: 1.65, color: "#64748b" }}>
              Type any topic — AI adoption, remote work, performance bonuses, automation, broadband, wages —
              and find every relevant question across Census surveys.
            </div>
            <div style={{ marginTop: 22, display: "flex", gap: 8, justifyContent: "center", flexWrap: "wrap" }}>
              {["Artificial Intelligence", "remote work", "performance bonuses", "automation", "cloud computing", "predictive analytics"].map(t => (
                <button key={t} onClick={() => setQuery(t)}
                  style={{
                    background: "white", border: "1.5px solid #e2e8f0", borderRadius: 20,
                    padding: "6px 14px", fontSize: 12.5, color: "#475569", cursor: "pointer",
                    boxShadow: "0 1px 3px rgba(0,0,0,0.06)", transition: "all 0.12s",
                  }}
                  onMouseOver={e => { e.target.style.borderColor = "#3b82f6"; e.target.style.color = "#1d4ed8"; }}
                  onMouseOut={e => { e.target.style.borderColor = "#e2e8f0"; e.target.style.color = "#475569"; }}
                >
                  {t}
                </button>
              ))}
            </div>
          </div>
        )}
      </div>

      <div style={{ textAlign: "center", padding: "12px 0 28px", fontSize: 11.5, color: "#cbd5e1" }}>
        Covers: BTOS Core (2022–2026) · BTOS AI Supplement (2023–2026) · BTOS WFH Supplement (2024–2025) · ABS (2018–2020) · ASM (2018–2021) · ACES (1995–2003) · MOPS (2010, 2015, 2021) · BERD (2024) · Economic Census (2022)
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
